<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optical Concept Drancy | Haute Optique</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Dancing+Script:wght@700&display=swap');

        :root {
            --brand-violet: #663377; 
            --brand-green: #8CC63F;  
            --dark-bg: #0a0a0a;
        }

        ::-webkit-scrollbar { display: none; }
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            scroll-behavior: smooth;
        }

        .font-script { font-family: 'Dancing Script', cursive; }

        /* --- BACKGROUND HERO --- */
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 70% 50%, rgba(102, 51, 119, 0.15) 0%, transparent 50%),
                        linear-gradient(to bottom, transparent 0%, var(--dark-bg) 95%);
            z-index: 1;
        }

        .hero-img-container {
            position: absolute;
            inset: 0;
            z-index: -10;
            overflow: hidden;
        }

        .hero-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.5;
            transform: scale(1.1);
        }

        /* --- NAVIGATION --- */
        .nav-link { position: relative; cursor: pointer; }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0; height: 2px;
            bottom: -4px; left: 0;
            background-color: var(--brand-violet);
            transition: width 0.3s ease;
        }
        .nav-link:hover::after { width: 100%; }

        .social-logo-img {
            width: 20px; height: 20px;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        /* --- MENU MOBILE CLIP-PATH --- */
        #mobile-menu-overlay {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 10000;
            display: flex; /* Toujours en flex pour le contenu */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* CACHÉ PAR DÉFAUT */
            clip-path: circle(0% at 100% 0%);
            transition: clip-path 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: none; /* Désactivé tant qu'il est fermé */
        }
        
        #mobile-menu-overlay.active {
            clip-path: circle(150% at 100% 0%);
            pointer-events: all; /* Réactivé quand ouvert */
        }

        /* --- MARQUES / FILTRES --- */
        .brand-card {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 250px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .brand-logo-container {
            width: 100%;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .brand-logo-container img {
            max-width: 80%;
            max-height: 100%;
            object-fit: contain;
        }

        .item-hidden { display: none !important; }

        .filter-container {
            position: relative;
            background: rgba(255,255,255,0.05);
            padding: 6px;
            border-radius: 9999px;
            display: inline-flex;
            overflow-x: auto;
        }

        .filter-btn {
            position: relative;
            z-index: 2;
            padding: 8px 20px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
        }

        .glider {
            position: absolute;
            height: calc(100% - 12px);
            top: 6px;
            z-index: 1;
            background: var(--brand-violet);
            border-radius: 9999px;
        }

        #map { height: 100%; width: 100%; }
        
        #brand-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 20000;
            background: rgba(0,0,0,0.95);
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <!-- NAVIGATION PC -->
    <nav id="navbar" class="fixed w-full z-[999] transition-all duration-500 py-6 md:py-8 px-6 md:px-12 flex justify-between items-center">
        <div class="flex flex-col leading-none">
            <span class="text-2xl md:text-5xl font-extrabold uppercase tracking-tighter">Optical <span class="font-script text-[--brand-green] capitalize text-3xl md:text-4xl">Concept</span></span>
        </div>

        <!-- Menu Desktop (Caché sur mobile) -->
        <div class="hidden lg:flex gap-10 text-sm uppercase tracking-[0.2em] font-bold items-center">
            <a onclick="scrollToSection('#home')" class="nav-link">Accueil</a>
            <a onclick="scrollToSection('#marques')" class="nav-link">Nos Marques</a>
            <a href="services.html" class="nav-link">Nos Services</a>
            
            <div class="flex items-center gap-5 px-6 border-x border-white/10">
                <a href="https://www.instagram.com/optical.concept/" target="_blank">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="social-logo-img">
                </a>
                <a href="https://www.facebook.com/opticalconcept/" target="_blank">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" class="social-logo-img">
                </a>
            </div>

            <a href="https://www.opticiensparconviction.fr/votre-opticien-a-drancy/optical-concept/prise-de-rdv" target="_blank" class="bg-[--brand-violet] px-8 py-4 rounded-full hover:scale-105 transition-all text-white">Prendre RDV</a>
        </div>

        <!-- Bouton Burger (Visible sur mobile) -->
        <button id="menu-open-btn" class="lg:hidden flex flex-col gap-1.5 p-2">
            <span class="w-8 h-0.5 bg-white"></span>
            <span class="w-8 h-0.5 bg-white"></span>
            <span class="w-8 h-0.5 bg-white"></span>
        </button>
    </nav>

    <!-- MENU MOBILE OVERLAY -->
    <div id="mobile-menu-overlay">
        <button id="menu-close-btn" class="absolute top-8 right-8 p-2">
            <i data-lucide="x" class="w-10 h-10 text-white"></i>
        </button>

        <div class="flex flex-col items-center gap-8 text-center">
            <a onclick="closeMobileMenu(); scrollToSection('#home')" class="text-3xl font-black uppercase italic">Accueil</a>
            <a onclick="closeMobileMenu(); scrollToSection('#marques')" class="text-3xl font-black uppercase italic">Nos Marques</a>
            <a href="services.html" class="text-3xl font-black uppercase italic">Nos Services</a>
            
            <div class="flex gap-8 my-4">
                <a href="https://www.instagram.com/optical.concept/" target="_blank">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="w-10 h-10">
                </a>
                <a href="https://www.facebook.com/opticalconcept/" target="_blank">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" class="w-10 h-10">
                </a>
            </div>

            <a href="https://www.opticiensparconviction.fr/votre-opticien-a-drancy/optical-concept/prise-de-rdv" target="_blank" class="bg-[--brand-violet] px-10 py-5 rounded-full text-white font-bold uppercase text-sm">Prendre RDV</a>
        </div>
    </div>

    <!-- HERO SECTION -->
    <section id="home" class="relative h-screen flex items-center overflow-hidden">
        <div class="hero-img-container">
            <img src="https://images.unsplash.com/photo-1511499767150-a48a237f0083?q=80&w=2000" id="hero-bg">
            <div class="hero-overlay"></div>
        </div>

        <div class="container mx-auto px-6 md:px-12 relative z-10">
            <div class="max-w-3xl">
                <div class="flex items-center gap-4 mb-6">
                    <span class="h-[2px] w-12 bg-[--brand-green]"></span>
                    <span class="text-[--brand-green] uppercase tracking-[0.3em] text-xs font-bold">Votre Regard, Notre Signature</span>
                </div>
                <h1 class="text-5xl md:text-8xl font-extrabold leading-none mb-8 italic">
                    L'ÉLÉGANCE <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-[--brand-violet] to-purple-400">À DRANCY.</span>
                </h1>
                <div class="flex flex-wrap gap-6 mt-12">
                    <a onclick="scrollToSection('#marques')" class="px-8 py-4 border border-white/30 rounded-full font-bold uppercase text-[10px] tracking-widest hover:bg-white hover:text-black transition-all cursor-pointer">Nos Marques</a>
                    <a href="tel:0148305950" class="flex items-center gap-3 bg-white/5 border border-white/10 px-6 py-4 rounded-full group hover:border-[--brand-violet] transition-all">
                        <i data-lucide="phone-call" class="w-4 h-4 text-[--brand-green]"></i>
                        <span class="text-xs font-bold tracking-widest">01 48 30 59 50</span>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- SECTION MARQUES -->
    <section id="marques" class="py-24 bg-black">
        <div class="container mx-auto px-6">
            <div class="mb-16">
                <h2 class="text-4xl md:text-5xl font-bold uppercase tracking-tighter mb-8">Nos <br><span class="text-gray-600 italic font-light">Marques</span></h2>
                
                <div class="flex flex-col lg:flex-row gap-6 justify-between items-center">
                    <div class="relative w-full lg:max-w-md">
                        <input type="text" id="brandSearch" onkeyup="searchBrands()" placeholder="Rechercher une marque..." class="bg-white/5 border border-white/10 text-white px-6 py-4 rounded-full w-full outline-none focus:border-[--brand-violet]">
                    </div>

                    <div class="filter-container">
                        <div class="glider" id="glider"></div>
                        <button onclick="filterSelection('all', event)" class="filter-btn active">Tous</button>
                        <button onclick="filterSelection('luxe', event)" class="filter-btn">Luxe</button>
                        <button onclick="filterSelection('createur', event)" class="filter-btn">Créateur</button>
                        <button onclick="filterSelection('sport', event)" class="filter-btn">Solaire</button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="brandGrid">
                <div class="brand-card sport createur" data-name="carrera">
                    <div class="brand-logo-container"><img src="carrera.jpg" alt="Carrera"></div>
                    <p class="text-black font-bold text-center text-sm uppercase">Carrera</p>
                    <button onclick="openBrand('Carrera', 'Design iconique et sportif.')" class="mt-4 text-[--brand-violet] text-xs font-bold border-b border-violet-200">En savoir plus</button>
                </div>
                <div class="brand-card luxe createur" data-name="cazal">
                    <div class="brand-logo-container"><img src="cazal.png" alt="Cazal"></div>
                    <p class="text-black font-bold text-center text-sm uppercase">Cazal</p>
                    <button onclick="openBrand('Cazal', 'L\'extravagance et le luxe absolu.')" class="mt-4 text-[--brand-violet] text-xs font-bold border-b border-violet-200">En savoir plus</button>
                </div>
                <!-- Ajoute ici les autres cartes sur le même modèle -->
            </div>
        </div>
    </section>

    <!-- MODAL -->
    <div id="brand-modal" onclick="closeModal()">
        <div class="bg-zinc-900 border border-white/10 p-10 rounded-[2rem] max-w-lg w-full m-4" onclick="event.stopPropagation()">
            <h3 id="modal-title" class="text-3xl font-bold uppercase italic text-[--brand-violet] mb-4"></h3>
            <p id="modal-desc" class="text-gray-400 mb-8"></p>
            <button onclick="closeModal()" class="w-full bg-white/5 py-4 rounded-xl font-bold uppercase tracking-widest border border-white/10 hover:bg-white/10 transition-all">Fermer</button>
        </div>
    </div>

    <!-- CONTACT & MAP -->
    <section id="contact" class="py-24 bg-[#050505]">
        <div class="container mx-auto px-6 grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
            <div class="space-y-10">
                <h2 class="text-5xl font-bold tracking-tighter italic">NOUS <br><span class="text-[--brand-violet]">TROUVER.</span></h2>
                <div class="space-y-6">
                    <div class="flex gap-4">
                        <i data-lucide="map-pin" class="text-[--brand-violet]"></i>
                        <p class="text-gray-400">109 Avenue Henri Barbusse, 93700 Drancy</p>
                    </div>
                    <div class="flex gap-4">
                        <i data-lucide="clock" class="text-[--brand-green]"></i>
                        <p class="text-gray-400">Lun - Sam : 10:00 – 19:00</p>
                    </div>
                </div>
            </div>
            <div class="h-[450px] rounded-[2rem] overflow-hidden border border-white/10">
                <div id="map"></div>
            </div>
        </div>
    </section>

    <script>
        lucide.createIcons();

        // --- NAVIGATION & SCROLL ---
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) {
                nav.classList.add('bg-black/90', 'backdrop-blur-xl', 'py-4', 'border-b', 'border-white/5');
            } else {
                nav.classList.remove('bg-black/90', 'backdrop-blur-xl', 'py-4', 'border-b', 'border-white/5');
            }
        });

        function scrollToSection(id) {
            gsap.to(window, { duration: 1.2, scrollTo: { y: id, offsetY: 80 }, ease: "power4.inOut" });
        }

        // --- MENU MOBILE ---
        const menuOverlay = document.getElementById('mobile-menu-overlay');
        document.getElementById('menu-open-btn').addEventListener('click', () => {
            menuOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        });
        document.getElementById('menu-close-btn').addEventListener('click', closeMobileMenu);
        function closeMobileMenu() {
            menuOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        // --- CARTES & FILTRES ---
        function animateCards() {
            const cards = document.querySelectorAll('.brand-card:not(.item-hidden)');
            gsap.fromTo(cards, {opacity: 0, y: 20}, {opacity: 1, y: 0, stagger: 0.1, duration: 0.4});
        }

        function filterSelection(cat, e) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.currentTarget.classList.add('active');
            
            const glider = document.getElementById('glider');
            gsap.to(glider, { x: e.currentTarget.offsetLeft - 6, width: e.currentTarget.offsetWidth, duration: 0.3 });

            document.querySelectorAll('.brand-card').forEach(card => {
                card.classList.toggle('item-hidden', cat !== 'all' && !card.classList.contains(cat));
            });
            animateCards();
        }

        function searchBrands() {
            const q = document.getElementById('brandSearch').value.toLowerCase();
            document.querySelectorAll('.brand-card').forEach(card => {
                card.classList.toggle('item-hidden', !card.dataset.name.includes(q));
            });
        }

        // --- MODAL & MAP ---
        function openBrand(t, d) {
            document.getElementById('modal-title').innerText = t;
            document.getElementById('modal-desc').innerText = d;
            document.getElementById('brand-modal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('brand-modal').style.display = 'none'; }

        const coords = [48.9242, 2.4439];
        const map = L.map('map', { scrollWheelZoom: false }).setView(coords, 16);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        L.marker(coords).addTo(map);
    </script>
</body>
</html>
